<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>XP Standalone | React4xp Starter</title>

        <!-- OPTION 1: You can get React and ReactDOM from CDN like this... -->
        <script crossorigin src="https://unpkg.com/react@16/umd/react.production.min.js"></script>
        <script crossorigin src="https://unpkg.com/react-dom@16/umd/react-dom.production.min.js"></script>

        <!-- OPTION 2: React and ReactDOM are also available as a chunk from this service (if the react4xp-build-externals step is included in build.gradle):
        <script data-th-src="${portal.serviceUrl({'_service=react4xp-externals'})}"></script> -->

        <!-- As opposed to in pure.html, you don't need a call to the react4xp-client service here
        - the controller provides it in the list of dependency urls.
         React and ReactDOM themselves, however, are needed in the regular manner (OPTION 1 or 2 above). -->
    </head>

    <body>
        <p><strong>Client-side rendering</strong></p>
        <p>Hardcodes the <code>React4xp.CLIENT.render</code> call, and client-side renders it using the dependency service URLs inserted by the controller (<code>webapp.es6</code>).</p>
        <p>Here goes:</p>


        <div id="target_container"></div>


        <!-- import React4xp and its frontend-core CLIENT (from the react4xp-client) and all its dependency chunks, and the component: -->
        <script data-th-each="url: ${urls}" data-th-src="${url}"></script>

        <!-- Use React4xp.CLIENT to render the ColorThing component into the 'target' element above, with some props: -->
        <script defer>
            React4xp.CLIENT.render(React4xp.ColorThing, 'target_container', {color: "crimson"});
        </script>

        <a href="?pure">See the pure standalone version...</a>
    </body>

</html>
